name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.6.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | tr -d '\r\n' | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n1)
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=app/build/outputs/apk/release/deliveries-${VERSION_NAME}.apk
          # Auto-discover alias from keystore when KEY_ALIAS secret is not set
          if [ -z "$KEY_ALIAS" ]; then
            KEY_ALIAS=$(keytool -list -storepass "$KEYSTORE_PASSWORD" -keystore "$RUNNER_TEMP/release.jks" 2>/dev/null \
              | grep "PrivateKeyEntry" | awk -F',' '{print $1}' | tr -d ' ')
          fi
          "${BUILD_TOOLS}apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEYSTORE_PASSWORD" \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --v3-signing-enabled false \
            --out "$SIGNED" \
            "$UNSIGNED"
          "${BUILD_TOOLS}apksigner" verify "$SIGNED"
          echo "APK_PATH=$SIGNED" >> "$GITHUB_ENV"

      - name: Resolve changelog
        id: changelog
        run: |
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | grep -o '[0-9]*')
          echo "path=fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.changelog.outputs.path }}
          files: ${{ env.APK_PATH }}
