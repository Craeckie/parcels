name: Build

on:
  push:
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAVE_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew assembleRelease

      - name: Run unit tests
        run: ./gradlew testRelease

      - name: Decode keystore
        if: env.HAVE_KEYSTORE == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | tr -d '\r\n' | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Sign APK
        if: env.HAVE_KEYSTORE == 'true'
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n1)
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          SIGNED=app/build/outputs/apk/release/app-release-signed.apk
          "${BUILD_TOOLS}apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --key-pass "pass:$KEYSTORE_PASSWORD" \
            --v1-signing-enabled false \
            --v2-signing-enabled true \
            --v3-signing-enabled false \
            --out "$SIGNED" \
            "$UNSIGNED"
          "${BUILD_TOOLS}apksigner" verify "$SIGNED"

      - name: Prepare APK path
        run: |
          if [ -f "app/build/outputs/apk/release/app-release-signed.apk" ]; then
            echo "APK_PATH=app/build/outputs/apk/release/app-release-signed.apk" >> "$GITHUB_ENV"
            echo "APK_NAME=app-release-signed.apk" >> "$GITHUB_ENV"
          else
            echo "APK_PATH=app/build/outputs/apk/release/app-release-unsigned.apk" >> "$GITHUB_ENV"
            echo "APK_NAME=app-release-unsigned.apk" >> "$GITHUB_ENV"
          fi

      - uses: actions/upload-artifact@v4
        name: Upload APK artifact
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}

      - uses: actions/upload-artifact@v4
        name: Upload unit test report
        if: always()
        with:
          name: Unit test report
          path: app/build/reports/tests/testReleaseUnitTest/
